[project]
name = "gwei-pattern"
authors = ["Gwei Labs"]
description = "Advanced blockchain-based subscription management platform"
telemetry = false
requirements = []

[contracts.gwei-payment-engine]
path = "contracts/gwei-payment-engine.clar"
depends_on = []

[contracts.gwei-metrics]
path = "contracts/gwei-metrics.clar"
depends_on = []

[contracts.gwei-lifecycle-manager]
path = "contracts/gwei-lifecycle-manager.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
